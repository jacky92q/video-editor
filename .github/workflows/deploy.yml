name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      # 머지 전 미리 배포해 보기 위한 기능 브랜치 (main 머지 후 제거해도 됩니다)
      - claude/video-editing-webapp-eb9f0a
  # 수동 실행도 가능하게
  workflow_dispatch:

# GITHUB_TOKEN에 Pages 배포 권한 부여
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1개로 제한 (진행 중인 배포는 취소하지 않음)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.25" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="play" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e7e9ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1e1b4b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Clapperboard top stripes -->
  <g transform="translate(256 256) rotate(-12) translate(-256 -256)">
    <rect x="120" y="150" width="272" height="50" rx="12" fill="#1e1b4b"/>
    <g fill="#c7d2fe">
      <path d="M138 150 L168 200 L196 200 L166 150 Z"/>
      <path d="M196 150 L226 200 L254 200 L224 150 Z"/>
      <path d="M254 150 L284 200 L312 200 L282 150 Z"/>
      <path d="M312 150 L342 200 L370 200 L340 150 Z"/>
    </g>
  </g>

  <!-- Screen body -->
  <rect x="120" y="206" width="272" height="156" rx="20" fill="#0b0d17" filter="url(#shadow)"/>

  <!-- Play / fast-forward (timelapse) glyph -->
  <g fill="url(#play)">
    <path d="M214 248 L266 284 L214 320 Z"/>
    <path d="M268 248 L320 284 L268 320 Z"/>
  </g>
</svg>
